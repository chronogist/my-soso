# fly.toml app configuration file generated for my-soso-worker on 2026-05-11T21:55:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'my-soso-worker'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile.worker'

[deploy]
  strategy = 'immediate'

[env]
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'

[processes]
  app = 'pnpm --filter @my-soso/worker start'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
